runtime: "container"
build:
  dockerfile: "Dockerfile"
  dockerBuildPath: "."
startCommand:
  type: "http"
  configSchema:
    type: object
    properties:
      domain:
        type: string
        description: "Auth0 tenant domain (e.g. your-tenant.auth0.com)"
      token:
        type: string
        description: "Auth0 Management API token"
    required:
      - domain
      - token
